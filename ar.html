<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three Monsters AR</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
  <a-scene embedded arjs>

    <a-assets timeout="10000">
      <a-asset-item id="yellowMonster" src="yellow_monster.glb"></a-asset-item>
      <a-asset-item id="mintMonster" src="mint_monster.glb"></a-asset-item>
      <a-asset-item id="coralMonster" src="coral_monster.glb"></a-asset-item>
    </a-assets>

    <a-marker preset="hiro">

      <!-- left monster -->
      <a-entity
        position="-0.25 0.01 0"
        animation="property: position; to: -0.25 0.12 0; dir: alternate; loop: true; dur: 900; easing: easeInOutSine">
        <a-entity
          gltf-model="#mintMonster"
          rotation="90 180 0"
          scale="0.10 0.10 0.10">
        </a-entity>
      </a-entity>

      <!-- center monster -->
      <a-entity
        position="0 0.01 0"
        animation="property: position; to: 0 0.14 0; dir: alternate; loop: true; dur: 1100; easing: easeInOutSine">
        <a-entity
          gltf-model="#yellowMonster"
          rotation="90 180 0"
          scale="0.10 0.10 0.10">
        </a-entity>
      </a-entity>

      <!-- right monster -->
      <a-entity
        position="0.25 0.01 0"
        animation="property: position; to: 0.25 0.10 0; dir: alternate; loop: true; dur: 1000; easing: easeInOutSine">
        <a-entity
          gltf-model="#coralMonster"
          rotation="90 180 0"
          scale="0.10 0.10 0.10">
        </a-entity>
      </a-entity>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
