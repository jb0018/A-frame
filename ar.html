<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three Monsters AR</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
  </style>
</head>
<body>
  <a-scene
    mindar-image="imageTargetSrc: targets.mind; autoStart: true"
    embedded
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    style="width: 100%; height: 100vh;">

    <a-assets timeout="10000">
      <a-asset-item id="yellowMonster" src="yellow_monster.glb"></a-asset-item>
      <a-asset-item id="mintMonster" src="mint_monster.glb"></a-asset-item>
      <a-asset-item id="coralMonster" src="coral_monster.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">

      <!-- green monster -->
      <a-entity
        position="-0.25 0.01 0.1"
        animation="property: position; to: -0.25 0.12 0.1; dir: alternate; loop: true; dur: 900; easing: easeInOutSine">
        <a-entity
          gltf-model="#mintMonster"
          rotation="0 180 0"
          scale="0.10 0.10 0.10"
          animation__spin="property: rotation; from: 0 0 0; to: 0 360 0; loop: true; dur: 3000; easing: linear">
        </a-entity>
      </a-entity>

      <!-- yellow monster -->
      <a-entity
        position="0 0.01 0.1"
        animation="property: position; to: 0 0.14 0.1; dir: alternate; loop: true; dur: 1100; easing: easeInOutSine">
        <a-entity
          gltf-model="#yellowMonster"
          rotation="0 180 0"
          scale="0.10 0.10 0.10"
          animation__spin="property: rotation; from: 0 0 0; to: 0 360 0; loop: true; dur: 3500; easing: linear">
        </a-entity>
      </a-entity>

      <!-- coral monster -->
      <a-entity
        position="0.25 0.01 0.1"
        animation="property: position; to: 0.25 0.10 0.1; dir: alternate; loop: true; dur: 1000; easing: easeInOutSine">
        <a-entity
          gltf-model="#coralMonster"
          rotation="0 180 0"
          scale="0.10 0.10 0.10"
          animation__spin="property: rotation; from: 0 0 0; to: 0 360 0; loop: true; dur: 4000; easing: linear">
        </a-entity>
      </a-entity>

    </a-entity>
  </a-scene>
</body>
</html>
