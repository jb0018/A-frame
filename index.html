<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yellow Monster test</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>
  <a-scene background="color: #1a1a1a">

    <a-assets timeout="10000">
      <a-asset-item id="yellowMonster" src="yellow_monster.glb"></a-asset-item>
    </a-assets>

    <a-light type="ambient" intensity="1.5"></a-light>
    <a-light type="directional" position="2 4 3" intensity="2"></a-light>

    <a-entity
      gltf-model="#yellowMonster"
      position="0 1 -3"
      rotation="0 180 0"
      scale="0.4 0.4 0.4">
    </a-entity>

    <a-camera position="0 1.6 0"></a-camera>

  </a-scene>
</body>
</html>
